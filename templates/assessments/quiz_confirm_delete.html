{% extends 'base.html' %}
{% block title %}Delete Quiz{% endblock %}
{% block content %}
<div class="card max-w-md mx-auto mt-12 text-center">
    <h1 class="text-xl font-bold mb-4">Delete "{{ quiz.title }}"?</h1>
    <p class="text-gray-600 mb-6">This will permanently delete the quiz and all associated data.</p>
    <form method="post" class="flex gap-3 justify-center">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Delete</button>
        <a href="{% url 'assessments:instructor_dashboard' %}" class="btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
